name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_kind: ${{ steps.release_tag.outputs.release_kind }}
      npm_publish: ${{ steps.release_tag.outputs.npm_publish }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Classify release tag
        id: release_tag
        run: node scripts/release-policy.mjs classify

  verify-package:
    needs: classify
    if: ${{ needs.classify.outputs.release_kind == 'immutable' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - run: npm ci
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11 "$RUNNER_TEMP"
          echo "ACTIONLINT_BIN=$RUNNER_TEMP/actionlint" >> "$GITHUB_ENV"
      - run: npm run bundle
      - name: Run gates
        run: |
          set -uo pipefail
          declare -A pid=() result=(); declare -a names=(); MAX_PARALLEL_GATES=2
          finish_one() { local finished_pid status n; if wait -n -p finished_pid "${pid[@]}"; then status=0; else status=$?; fi; for n in "${!pid[@]}"; do if [ "${pid[$n]}" = "$finished_pid" ]; then result[$n]=$status; unset 'pid[$n]'; return; fi; done; }
          run() { while [ "${#pid[@]}" -ge "$MAX_PARALLEL_GATES" ]; do finish_one; done; local n=$1; shift; names+=("$n"); ( "$@" ) >"$n.log" 2>&1 & pid[$n]=$!; }
          run lint npm run lint; run test npm test; run typecheck npm run typecheck; run dist npm run verify:dist:assert; run actionlint "$ACTIONLINT_BIN"
          while [ "${#pid[@]}" -gt 0 ]; do finish_one; done; fail=0
          for n in "${names[@]}"; do if [ "${result[$n]}" -eq 0 ]; then echo "gate:$n=pass"; else echo "gate:$n=fail"; fail=1; fi; echo "::group::$n"; cat "$n.log"; echo '::endgroup::'; done
          exit $fail
      - name: Pack npm artifact
        run: |
          mkdir release-artifacts
          npm pack --pack-destination release-artifacts
          mv release-artifacts/*.tgz release-artifacts/release.tgz
      - name: Build self-contained SEA binary
        run: bash scripts/build-sea.sh
      - name: Smoke test SEA binary with an empty environment
        run: |
          VERSION="$(node -p "require('./package.json').version")"; BIN="$PWD/build/sea/postman-repo-sync-${VERSION}-linux-x64"
          out="$(env -i PATH=/nonexistent "$BIN" 2>&1 || true)"; echo "$out"
          echo "$out" | grep -qE 'is missing or invalid|is required'
          test "$(env -i PATH=/nonexistent "$BIN" --version)" = "$VERSION"
          test "$(NODE_OPTIONS='--this-flag-does-not-exist' "$BIN" --version)" = "$VERSION"
      - name: Smoke test SEA proxy routing
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/assert-sea-proxy.mjs "$PWD/build/sea/postman-repo-sync-${VERSION}-linux-x64" iapub.postman.co:443 --postman-access-token proxy-smoke-token --project-name proxy-smoke --workspace-id proxy-workspace --repo-write-mode none --generate-ci-workflow false
      - name: Stage release manifest
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          SEA="postman-repo-sync-${VERSION}-linux-x64"
          cp "build/sea/${SEA}" "build/sea/${SEA}.sha256" release-artifacts/
          node <<'NODE'
          const { createHash } = require('node:crypto');
          const { readFileSync, writeFileSync } = require('node:fs');
          const pkg = require('./package.json');
          const sea = `postman-repo-sync-${pkg.version}-linux-x64`;
          const paths = ['release.tgz', sea, `${sea}.sha256`];
          const sha256 = (path) => createHash('sha256').update(readFileSync(`release-artifacts/${path}`)).digest('hex');
          writeFileSync('release-artifacts/release-manifest.json', JSON.stringify({
            schema_version: 1,
            repository: process.env.GITHUB_REPOSITORY,
            commit_sha: process.env.GITHUB_SHA,
            tag: process.env.GITHUB_REF_NAME,
            package_name: pkg.name,
            package_version: pkg.version,
            artifacts: paths.map((path) => ({ path, sha256: sha256(path) }))
          }, null, 2));
          NODE
      - name: Verify release artifact contract
        run: node scripts/verify-release-artifacts.mjs release-artifacts
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-artifacts/
          if-no-files-found: error

  publish:
    needs: [classify, verify-package]
    if: ${{ needs.classify.outputs.release_kind == 'immutable' && needs.verify-package.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v7
        with:
          name: release-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-artifacts
      - name: Verify staged release artifacts
        run: |
          node --input-type=module - <<'NODE'
          import { createHash } from 'node:crypto';
          import { execFileSync } from 'node:child_process';
          import { existsSync, readdirSync, readFileSync } from 'node:fs';
          import { basename, join } from 'node:path';
          const d = 'release-artifacts';
          const SAFE = /^[A-Za-z0-9._-]+$/;
          const HEX = /^[a-f0-9]{64}$/;
          const sha256 = (bytes) => createHash('sha256').update(bytes).digest('hex');
          const manifest = JSON.parse(readFileSync(join(d, 'release-manifest.json'), 'utf8'));
          if (manifest.schema_version !== 1 || typeof manifest.repository !== 'string' || typeof manifest.commit_sha !== 'string' || typeof manifest.tag !== 'string' || typeof manifest.package_name !== 'string' || typeof manifest.package_version !== 'string' || !Array.isArray(manifest.artifacts)) throw new Error('invalid manifest schema');
          for (const [key, expected] of Object.entries({ repository: process.env.GITHUB_REPOSITORY, commit_sha: process.env.GITHUB_SHA, tag: process.env.GITHUB_REF_NAME })) if (manifest[key] !== expected) throw new Error(`manifest ${key} mismatch`);
          const sea = `postman-repo-sync-${manifest.package_version}-linux-x64`;
          const expectedNames = ['release.tgz', sea, `${sea}.sha256`];
          const seen = new Set();
          for (const artifact of manifest.artifacts) {
            if (!artifact || typeof artifact.path !== 'string' || typeof artifact.sha256 !== 'string') throw new Error('invalid artifact manifest entry');
            if (artifact.path !== basename(artifact.path) || artifact.path.includes('..') || artifact.path.includes('/') || artifact.path.includes('\\') || !SAFE.test(artifact.path) || !HEX.test(artifact.sha256)) throw new Error(`invalid artifact ${artifact.path}`);
            if (seen.has(artifact.path)) throw new Error(`duplicate artifact path ${artifact.path}`);
            seen.add(artifact.path);
          }
          if (expectedNames.some((name) => !seen.has(name)) || seen.size !== expectedNames.length) throw new Error('exact artifact allowlist mismatch');
          const onDisk = new Set(readdirSync(d));
          for (const name of expectedNames) if (!onDisk.has(name)) throw new Error(`missing artifact ${name}`);
          for (const name of onDisk) if (name !== 'release-manifest.json' && !seen.has(name)) throw new Error(`unexpected filesystem entry ${name}`);
          for (const artifact of manifest.artifacts) {
            const full = join(d, artifact.path);
            if (!existsSync(full)) throw new Error(`missing artifact ${artifact.path}`);
            if (sha256(readFileSync(full)) !== artifact.sha256) throw new Error(`checksum mismatch for ${artifact.path}`);
          }
          const packageJson = JSON.parse(execFileSync('tar', ['-xOf', join(d, 'release.tgz'), 'package/package.json'], { encoding: 'utf8' }));
          if (packageJson.name !== manifest.package_name || packageJson.version !== manifest.package_version) throw new Error('tarball package identity mismatch');
          const [major, minor, patch] = manifest.package_version.split('.');
          if (manifest.tag !== `v${manifest.package_version}` && !(patch === '0' && manifest.tag === `v${major}.${minor}`)) throw new Error(`tag ${manifest.tag} does not match package version ${manifest.package_version}`);
          const sidecarText = readFileSync(join(d, `${sea}.sha256`), 'utf8').trim();
          const [digest = '', filename = ''] = sidecarText.split(/\s+/);
          const actual = sha256(readFileSync(join(d, sea)));
          const seaEntry = manifest.artifacts.find((artifact) => artifact.path === sea);
          if (!HEX.test(digest) || filename !== sea || digest !== actual || !seaEntry || digest !== seaEntry.sha256) throw new Error('SEA sidecar digest does not match executable and manifest');
          NODE
      - name: Publish npm package or verify registry identity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./release-artifacts/release-manifest.json').package_name")
          VERSION=$(node -p "require('./release-artifacts/release-manifest.json').package_version")
          SRI=$(node -e "const fs=require('fs'),crypto=require('crypto');console.log('sha512-'+crypto.createHash('sha512').update(fs.readFileSync('release-artifacts/release.tgz')).digest('base64'))")
          set +e
          npm view "$PKG@$VERSION" dist.integrity >/tmp/integrity 2>/tmp/npm-view.err
          NPM_VIEW_STATUS=$?
          set -e
          if [ "$NPM_VIEW_STATUS" -eq 0 ]; then
            test "$(tr -d '[:space:]' </tmp/integrity)" = "$SRI" || {
              echo '::error::Published npm integrity differs from staged tarball'
              exit 1
            }
            echo '::notice::npm version already published with matching integrity'
          else
            if grep -qE '^npm (error|ERR!) code E404' /tmp/npm-view.err || grep -qE '^npm error 404\b' /tmp/npm-view.err; then
              npm publish ./release-artifacts/release.tgz --provenance --access public
            else
              echo '::error::npm view failed with a non-E404 error; refusing to publish or mutate GitHub'
              cat /tmp/npm-view.err >&2 || true
              exit 1
            fi
          fi
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/release.tgz
            release-artifacts/release-manifest.json
            release-artifacts/postman-repo-sync-*-linux-x64
            release-artifacts/postman-repo-sync-*-linux-x64.sha256

  advance-major-alias:
    needs: [classify, publish]
    if: ${{ needs.classify.outputs.release_kind == 'immutable' && needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Advance rolling major alias without regression
        run: |
          CANDIDATE="$(node -p "require('./package.json').version")"
          MAJOR="v${CANDIDATE%%.*}"
          set +e
          git ls-remote --exit-code --tags origin "refs/tags/$MAJOR" >/dev/null
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            git fetch --depth=1 --no-tags origin "refs/tags/$MAJOR:refs/tags/$MAJOR"
            CURRENT="$(git show "$MAJOR:package.json" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")"
            if node --input-type=module -e "import { isSemverOlder } from './scripts/release-policy.mjs'; process.exit(isSemverOlder(process.argv[1], process.argv[2]) ? 0 : 1)" "$CANDIDATE" "$CURRENT"; then
              echo "::notice::Candidate $CANDIDATE is older than current alias $MAJOR ($CURRENT); not moving it."
              exit 0
            fi
          elif [ "$status" -ne 2 ]; then
            echo "::error::failed to probe rolling alias $MAJOR (git ls-remote exit $status)"
            exit 1
          fi
          git config user.name 'github-actions[bot]'; git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -fa "$MAJOR" -m "Rolling $MAJOR alias -> $GITHUB_REF_NAME" "$GITHUB_SHA"
          git push origin "$MAJOR" --force

  dispatch-live-monitor:
    needs: [classify, publish]
    if: ${{ needs.classify.outputs.release_kind == 'immutable' && needs.publish.result == 'success' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Dispatch post-release smoke monitor
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          E2E_GATE_SUITE: smoke
          E2E_GATE_REF: ${{ github.ref_name }}
        run: node .github/scripts/dispatch-e2e-monitor.mjs
